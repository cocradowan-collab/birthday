<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Happy Birthday NUSRAT</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&family=Great+Vibes&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:'Poppins',sans-serif;
    overflow-x:hidden;
    background:#12010b;
    color:white;
}

/* BACKGROUND */
body::before{
    content:'';
    position:fixed;
    inset:0;
    background:
    radial-gradient(circle at top,#ff4f9a55,transparent 40%),
    radial-gradient(circle at bottom,#ff99cc33,transparent 40%),
    linear-gradient(to bottom,#1a0010,#000);
    z-index:-2;
}

/* FLOATING HEARTS */
.hearts{
    position:fixed;
    inset:0;
    overflow:hidden;
    z-index:-1;
}

.heart{
    position:absolute;
    color:#ff6aa9;
    animation:float linear infinite;
    opacity:.7;
}

@keyframes float{
    from{transform:translateY(100vh) scale(0.5);}
    to{transform:translateY(-120vh) scale(1.2);}
}

/* HERO */
.hero{
    min-height:100vh;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    text-align:center;
    padding:40px 20px;
}

.hero h1{
    font-size:70px;
    color:#ffb3d9;
    text-shadow:0 0 25px #ff4d94;
    font-family:'Great Vibes',cursive;
}

.hero p{
    margin-top:10px;
    font-size:22px;
    color:#ffd6e8;
}

/* COUNTDOWN */
.countdown{
    margin-top:40px;
    display:flex;
    gap:20px;
    flex-wrap:wrap;
    justify-content:center;
}

.box{
    background:rgba(255,255,255,0.08);
    padding:20px;
    border-radius:20px;
    width:120px;
    backdrop-filter:blur(10px);
    border:1px solid #ff6aa955;
}

.box h2{
    font-size:40px;
    color:#ffb6d9;
}

/* LOVE LETTER */
.letter{
    padding:80px 20px;
    display:flex;
    justify-content:center;
}

.letter-box{
    max-width:800px;
    background:rgba(255,182,193,0.1);
    border:1px solid #ff99cc55;
    padding:40px;
    border-radius:30px;
}

.letter-box h2{
    text-align:center;
    margin-bottom:30px;
    font-size:50px;
}

/* CANDLES */
.candles{
    position:fixed;
    bottom:0;
    width:100%;
    display:flex;
    justify-content:space-around;
    font-size:50px;
    padding:10px;
}
</style>
</head>

<body>

<div class="hearts" id="hearts"></div>

<section class="hero">

<h2>Happy Birthday NUSRAT 🫶🎀</h2>
<p>To my Tomato ❤️ </p>

<div class="countdown">
<div class="box"><h2 id="days">00</h2><span>DAYS</span></div>
<div class="box"><h2 id="hours">00</h2><span>HOURS</span></div>
<div class="box"><h2 id="minutes">00</h2><span>MINUTES</span></div>
<div class="box"><h2 id="seconds">00</h2><span>SECONDS</span></div>
</div>

</section>

<section class="gallery">
<img src="photo1.jpg" alt="">
<img src="photo2.jpg" alt="">
</section>

<section class="letter">
<div class="letter-box">
<h2>💌 Love Letter</h2>
<p>
happy birthday myyyyy jaaaaannnnnnuuuuuuuuuuu😘💗💞💝🎀🫶
<br><br>
I want to stay with you until my last breath ❤️
<br><br>
Loooovvvvvvvvvveeeeeeeeeee U Wifyyyyy🫶💗🎀
</p>
</div>
</section>



<script>

/* HEARTS */
const heartsContainer = document.getElementById('hearts');

for(let i=0;i<40;i++){
const heart = document.createElement('div');
heart.classList.add('heart');
heart.innerHTML = '❤';
heart.style.left = Math.random()*100 + 'vw';
heart.style.animationDuration = (Math.random()*5+5) + 's';
heart.style.fontSize = (Math.random()*20+15) + 'px';
heartsContainer.appendChild(heart);
}

/* FIXED COUNTDOWN */
const birthday = new Date("2026-06-02T00:00:00").getTime();

setInterval(()=>{
const now = new Date().getTime();
const distance = birthday - now;

const days = Math.floor(distance / (1000*60*60*24));
const hours = Math.floor((distance % (1000*60*60*24)) / (1000*60*60));
const minutes = Math.floor((distance % (1000*60*60)) / (1000*60));
const seconds = Math.floor((distance % (1000*60)) / 1000);

document.getElementById('days').innerText = days;
document.getElementById('hours').innerText = hours;
document.getElementById('minutes').innerText = minutes;
document.getElementById('seconds').innerText = seconds;
},1000);

</script>
<style>
   img {
  width: 300px;
  max-width: 100%;
  height: auto;
  display: block;
  margin: auto;
} 
    </style>
<img src="nus.jpg" >
</body>
</html>

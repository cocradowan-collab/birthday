<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Happy Birthday NUSRAT</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&family=Great+Vibes&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:'Poppins',sans-serif;
    overflow-x:hidden;
    background:#12010b;
    color:white;
}

/* BACKGROUND */
body::before{
    content:'';
    position:fixed;
    inset:0;
    background:
    radial-gradient(circle at top,#ff4f9a55,transparent 40%),
    radial-gradient(circle at bottom,#ff99cc33,transparent 40%),
    linear-gradient(to bottom,#1a0010,#000);
    z-index:-2;
}

/* FLOATING HEARTS */
.hearts{
    position:fixed;
    inset:0;
    overflow:hidden;
    z-index:-1;
}

.heart{
    position:absolute;
    color:#ff6aa9;
    animation:float linear infinite;
    opacity:.7;
}

@keyframes float{
    from{
        transform:translateY(100vh) scale(0.5);
    }
    to{
        transform:translateY(-120vh) scale(1.2);
    }
}

/* HERO */
.hero{
    min-height:100vh;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    text-align:center;
    padding:40px 20px;
}

.hero h1{
    font-size:70px;
    color:#ffb3d9;
    text-shadow:0 0 25px #ff4d94;
    font-family:'Great Vibes',cursive;
}

.hero p{
    margin-top:10px;
    font-size:22px;
    color:#ffd6e8;
}

/* IMAGE */
img{
    width:900px;
    max-width:92%;
    height:auto;
    display:block;
    margin:40px auto;
    border-radius:25px;
    box-shadow:0 0 30px #ff4f9a55;
}

/* LOVE LETTER */
.letter{
    padding:80px 20px;
    display:flex;
    justify-content:center;
}

.letter-box{
    max-width:800px;
    background:rgba(255,182,193,0.1);
    border:1px solid #ff99cc55;
    padding:40px;
    border-radius:30px;
    backdrop-filter:blur(10px);
}

.letter-box h2{
    text-align:center;
    margin-bottom:30px;
    font-size:50px;
}

.letter-box p{
    font-size:20px;
    line-height:1.8;
    text-align:center;
}

/* MOBILE OPTIMIZATION */
@media (max-width:1080px){

    .hero{
        padding:30px 15px;
    }

    .hero h1{
        font-size:52px;
        line-height:1.2;
    }

    .hero p{
        font-size:20px;
    }

    img{
        max-width:95%;
        margin:30px auto;
    }

    .letter{
        padding:50px 15px;
    }

    .letter-box{
        padding:30px 20px;
    }

    .letter-box h2{
        font-size:38px;
    }

    .letter-box p{
        font-size:18px;
    }
}

</style>
</head>

<body>

<div class="hearts" id="hearts"></div>

<section class="hero">

<h1>Happy Birthday NUSRAT 🫶🎀</h1>
<p>To my Tomato ❤️</p>

</section>

<img src="nus.jpg" alt="Nusrat">

<section class="letter">

<div class="letter-box">

<h2>💌 Love Letter</h2>

<p>
happy birthday myyyyy jaaaaannnnnnuuuuuuuuuuu😘💗💞💝🎀🫶
<br><br>
I want to stay with you until my last breath ❤️
<br><br>
Loooovvvvvvvvvveeeeeeeeeee U Wifyyyyy🫶💗🎀
</p>

</div>

</section>

<script>

/* HEARTS */

const heartsContainer = document.getElementById('hearts');

for(let i=0;i<40;i++){

const heart = document.createElement('div');

heart.classList.add('heart');

heart.innerHTML = '❤';

heart.style.left = Math.random()*100 + 'vw';

heart.style.animationDuration = (Math.random()*5+5) + 's';

heart.style.fontSize = (Math.random()*20+15) + 'px';

heartsContainer.appendChild(heart);

}

</script>

</body>
</html>
